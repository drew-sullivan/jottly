<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="/assets/app_icon.png">
<title>You're invited to play Jottly</title>
<meta name="description" content="A friend invited you to Jottly, a relaxed, friendly two-player word game. Get the app to join.">
<link rel="canonical" href="https://icedmatchalabs.com/join/">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Jottly">
<meta property="og:url" content="https://icedmatchalabs.com/join/">
<meta property="og:title" content="You're invited to play Jottly">
<meta property="og:description" content="A relaxed, friendly two-player word game. Tap to get Jottly and join.">
<meta property="og:image" content="https://icedmatchalabs.com/assets/app_icon.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="You're invited to play Jottly">
<meta name="twitter:description" content="A relaxed, friendly two-player word game. Tap to get Jottly and join.">
<meta name="twitter:image" content="https://icedmatchalabs.com/assets/app_icon.png">
<meta name="apple-itunes-app" content="app-id=6780044797">
<style>
  :root{
    --coral:#F36B4F; --apricot:#F7B267; --teal:#26A096;
    --cream:#FAF8F4; --cloud:#fff; --ink:#111; --stone:#6b6b6b; --mist:#e7e3db;
  }
  *{box-sizing:border-box}
  body{
    font-family: ui-rounded, "SF Pro Rounded", "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color:var(--ink); background:var(--cream); margin:0;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{
    background:var(--cloud); border:1px solid var(--mist); border-radius:26px;
    padding:40px 32px; max-width:440px; width:100%; text-align:center;
    box-shadow:0 12px 40px rgba(17,17,17,.07);
  }
  .bot{width:108px; height:108px; object-fit:contain; margin:0 auto 6px}
  .word{display:flex; gap:8px; justify-content:center; margin:8px 0 18px}
  .tile{width:44px; height:44px; border-radius:11px; border:3px solid var(--ink);
        display:flex; align-items:center; justify-content:center; font-weight:800; font-size:24px; background:var(--cloud)}
  .tile.j{background:var(--coral)}
  h1{font-size:30px; line-height:1.12; margin:6px 0 10px; letter-spacing:-.4px}
  p.lead{font-size:18px; color:var(--stone); margin:0 0 26px; line-height:1.5}
  .btn{
    display:inline-block; font-weight:800; font-size:18px; text-decoration:none;
    color:var(--ink); background:var(--coral); border:3px solid var(--ink);
    border-radius:16px; padding:14px 26px; transition:transform .12s ease;
  }
  .btn:hover{transform:translateY(-2px)}
  p.fine{font-size:14px; color:var(--stone); margin:20px 0 0}
  p.fine a{color:var(--coral)}
</style>
</head>
<body>
  <main class="card">
    <img class="bot" src="/assets/jotbot_waving.png" alt="JotBot waving">
    <div class="word">
      <span class="tile j">J</span><span class="tile">O</span><span class="tile">T</span>
      <span class="tile">T</span><span class="tile">Y</span>
    </div>
    <h1>A friend invited you to play Jottly!</h1>
    <p class="lead">Jottly is a relaxed, friendly two-player word game. Deduce each other's secret word in as few moves as you can. Free, no ads, no sign-up.</p>
    <a class="btn" id="get" href="https://apps.apple.com/app/id6780044797">Get Jottly</a>
    <p class="fine">Already have Jottly? Opening this link on your iPhone drops you straight into the game.<br>
       <a href="/">About Jottly</a></p>
  </main>
  <script>
    // Deferred deep link: stash the invite link on the clipboard before the App Store detour, so a
    // freshly installed app can recover it on first launch and drop the player straight into the game.
    // Progressive enhancement - if the Clipboard API is unavailable or denied, we just go to the store.
    (function () {
      var get = document.getElementById('get');
      if (!get || !(navigator.clipboard && navigator.clipboard.writeText)) return;
      get.addEventListener('click', function (e) {
        var link = location.origin + location.pathname; // the clean /join/<id> universal link
        var store = get.getAttribute('href');
        e.preventDefault();
        navigator.clipboard.writeText(link).catch(function () {}).finally(function () {
          window.location.href = store;
        });
      });
    })();
  </script>
</body>
</html>
