<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>You're invited to a Jottly duel</title>
<meta name="description" content="A friend invited you to a Jottly duel - a fast, friendly two-player word game. Get the app to join.">
<meta property="og:title" content="You're invited to a Jottly duel">
<meta property="og:description" content="A fast, friendly two-player word game. Tap to get Jottly and join.">
<meta property="og:image" content="/assets/app_icon.png">
<style>
  :root{
    --coral:#F36B4F; --apricot:#F7B267; --teal:#26A096;
    --cream:#FAF8F4; --cloud:#fff; --ink:#111; --stone:#6b6b6b; --mist:#e7e3db;
  }
  *{box-sizing:border-box}
  body{
    font-family: ui-rounded, "SF Pro Rounded", "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color:var(--ink); background:var(--cream); margin:0;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{
    background:var(--cloud); border:1px solid var(--mist); border-radius:26px;
    padding:40px 32px; max-width:440px; width:100%; text-align:center;
    box-shadow:0 12px 40px rgba(17,17,17,.07);
  }
  .bot{width:108px; height:108px; object-fit:contain; margin:0 auto 6px}
  .word{display:flex; gap:8px; justify-content:center; margin:8px 0 18px}
  .tile{width:44px; height:44px; border-radius:11px; border:3px solid var(--ink);
        display:flex; align-items:center; justify-content:center; font-weight:800; font-size:24px; background:var(--cloud)}
  .tile.j{background:var(--coral)}
  h1{font-size:30px; line-height:1.12; margin:6px 0 10px; letter-spacing:-.4px}
  p.lead{font-size:18px; color:var(--stone); margin:0 0 26px; line-height:1.5}
  .btn{
    display:inline-block; font-weight:800; font-size:18px; text-decoration:none;
    color:var(--ink); background:var(--coral); border:3px solid var(--ink);
    border-radius:16px; padding:14px 26px; transition:transform .12s ease;
  }
  .btn:hover{transform:translateY(-2px)}
  p.fine{font-size:14px; color:var(--stone); margin:20px 0 0}
  p.fine a{color:var(--coral)}
</style>
</head>
<body>
  <main class="card">
    <img class="bot" src="/assets/jotbot_waving.png" alt="JotBot waving">
    <div class="word">
      <span class="tile j">J</span><span class="tile">O</span><span class="tile">T</span>
      <span class="tile">T</span><span class="tile">Y</span>
    </div>
    <h1>A friend invited you to a Jottly duel!</h1>
    <p class="lead">Jottly is a fast, friendly two-player word game - guess each other's secret word in as few moves as you can. Free, no ads, no sign-up.</p>
    <a class="btn" href="https://apps.apple.com/app/id6780044797">Get Jottly</a>
    <p class="fine">Already have Jottly? Opening this link on your iPhone drops you straight into the game.<br>
       <a href="/">About Jottly</a></p>
  </main>
</body>
</html>
